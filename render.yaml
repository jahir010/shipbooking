services:
  - type: web
    name: shipbooking-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python bootstrap_db.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: DATABASE_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DB_GENERATE_SCHEMAS
        value: "False"
      - key: RUN_STARTUP_SCHEMA_SYNC
        value: "False"
      - key: APP_URL
        value: https://out-beige-tau.vercel.app
      - key: API_PUBLIC_BASE_URL
        value: https://shipbooking-api.onrender.com/api
      - key: BACKEND_CORS_ORIGINS
        value: https://out-beige-tau.vercel.app,http://localhost:3000,http://127.0.0.1:3000
      - key: SSLCOMMERZ_STORE_ID
        sync: false
      - key: SSLCOMMERZ_STORE_PASSWORD
        sync: false
      - key: SSLCOMMERZ_SANDBOX_MODE
        value: "True"
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
